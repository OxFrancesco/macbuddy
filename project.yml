name: MacBuddy
options:
  bundleIdPrefix: dev.francescooddo
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
targets:
  MacBuddy:
    type: application
    platform: macOS
    sources:
      - path: MacBuddy
    scheme:
      testTargets: []
    settings:
      base:
        PRODUCT_NAME: MacBuddy
        PRODUCT_BUNDLE_IDENTIFIER: dev.francescooddo.macbuddy
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "MacBuddy opens your terminal app and runs your chosen coding agent inside new project folders."
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
